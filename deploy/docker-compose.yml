version: "3.8"

services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    ports:
      - "8765:8765"
    volumes:
      - dubora-data:/data
    env_file:
      - ../.env
    restart: unless-stopped

  pipeline:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pipeline
    volumes:
      - dubora-data:/data
    env_file:
      - ../.env
    environment:
      - API_URL=http://web:8765
    command: ["vsd-pipeline", "worker", "--api-url", "http://web:8765"]
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy

volumes:
  dubora-data:
