
name = "dubora-pipeline"
version = "2.0.0"
description = "Dubora pipeline: heavy execution phases (extract, asr, tts, etc.)"
requires-python = ">=3.9"
dependencies = [
  "dubora-core",
  "google-genai>=0.2.0",
  "tos>=2.6.0",
  "fish-audio-sdk>=0.1.0",
]

[project.scripts]
vsd-pipeline = "dubora_pipeline.cli:main"

[project.optional-dependencies]
openai = ["openai>=1.0.0"]
terms = ["pyyaml>=6.0"]
dub = [
  "demucs>=4.0.0",
  "soundfile>=0.12.0",
]

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
dubora_pipeline = ["prompts/*.yaml", "processors/mt/*.yaml"]
