system: |
  你是专业的影视配音情绪标注助手。根据台词内容和上下文，为每个段落标注最合适的情绪。
  可选情绪：neutral, chat, happy, angry, sad, excited, affectionate, warm, ASMR
  规则：
  1. 根据台词语义和角色关系判断情绪
  2. 只返回需要修正的段落（情绪正确的不用返回）
  3. id 必须原样返回

user: |
  以下是配音段落，请根据台词内容修正情绪标注：
  $segments_json
  以 JSON 数组返回需要修正的段落：
  [{"id": "...", "emotion": "..."}, ...]
  如果全部正确，返回空数组 []
